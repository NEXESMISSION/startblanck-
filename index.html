    } else if (mode === 'top') {
      const t = Math.min(...items.map(n => n.y));
      for (const n of items) setNodePos(n, n.x, t);
    } else if (mode === 'bottom') {
      const t = Math.max(...dims.map(d => d.n.y + d.h));
      for (const d of dims) setNodePos(d.n, d.n.x, t - d.h);
    } else if (mode === 'cy') {
      const cs = dims.map(d => d.n.y + d.h / 2);
      const t  = (Math.min(...cs) + Math.max(...cs)) / 2;
      for (const d of dims) setNodePos(d.n, d.n.x, t - d.h / 2);
    }
    scheduleSave();
  }

  function distributeSelected(axis) {
    const items = _selectedAlignableNodes();
    if (items.length < 2) return;
    const raw = prompt('Spacing in pixels between items:', '24');
    if (raw == null) return;
    const gap = Math.max(0, parseFloat(raw) || 0);
    const dims = items.map(n => ({
      n,
      w: n.el.offsetWidth  || n.w || 0,
      h: n.el.offsetHeight || n.h || 0,
    }));
    if (axis === 'h') {
      dims.sort((a, b) => a.n.x - b.n.x);
      let cursor = dims[0].n.x;
      for (const d of dims) {
        setNodePos(d.n, cursor, d.n.y);
        cursor += d.w + gap;
      }
    } else {
      dims.sort((a, b) => a.n.y - b.n.y);
      let cursor = dims[0].n.y;
      for (const d of dims) {
        setNodePos(d.n, d.n.x, cursor);
        cursor += d.h + gap;
      }
    }
    scheduleSave();
  }

  function setCtrlIndicator(on) {
    if (on === state.ctrlDown) return;
    state.ctrlDown = on;
    wrap.classList.toggle('ctrl-down', on);
  }

  window.addEventListener('mousemove', (e) => {
    _lastMouse.x = e.clientX; _lastMouse.y = e.clientY;
  });

  window.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && !state.ctrlDown) setCtrlIndicator(true);

    if (e.code === 'Space' && !isEditing()) {
      if (!state.spaceDown) { state.spaceDown = true; wrap.classList.add('space-down'); }
      e.preventDefault();
      return;
    }
    if (e.key === 'Delete' && !isEditing()) { deleteSelected(); return; }
    if (e.key === 'ArrowUp'   && !isEditing()) { if (bringSelectedForward())  e.preventDefault(); return; }
    if (e.key === 'ArrowDown' && !isEditing()) { if (sendSelectedBackward())  e.preventDefault(); return; }
    if (e.key === 'Escape') {
      abortAllDrags();
      if (state.arrowMode) { setArrowMode(false); return; }
      if (lb.classList.contains('show')) closeLightbox();
      else if (ctxMenu.classList.contains('show')) hideContextMenu();
      else clearSelection();
      return;
    }
    // A = toggle arrow drawing mode (alternative to Ctrl+drag)
    if (e.key.toLowerCase() === 'a' && !e.ctrlKey && !e.metaKey && !e.altKey
        && !isEditing() && !isFormFocused()) {
      e.preventDefault();
      setArrowMode(!state.arrowMode);
      return;
    }
    // Ctrl+Z = undo, Ctrl+Shift+Z / Ctrl+Y = redo. Skipped while editing
    // text or focused in a form input so the browser's native undo/redo
    // works inside text editors.
    if ((e.ctrlKey || e.metaKey) && !e.altKey && !isEditing() && !isFormFocused()) {
      const k = e.key.toLowerCase();
      if (k === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
      if ((k === 'z' && e.shiftKey) || k === 'y') {
        e.preventDefault(); redo(); return;
      }
    }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a' && !isEditing() && !isFormFocused()) {
      e.preventDefault();
      clearSelection();
      for (const n of nodes.values())  if (!n.locked) addToSelection(n);
      for (const a of arrows.values()) addToSelection(a);
      return;
    }
    if (e.key.toLowerCase() === 'v' && !e.ctrlKey && !e.metaKey && !e.altKey
        && !isEditing() && !isFormFocused()) {
      e.preventDefault();
      const x = _lastMouse.x, y = _lastMouse.y;
      const el = document.elementFromPoint(x, y);
      const target = findItemFromTarget(el);
      showContextMenu({ clientX: x, clientY: y }, target);
      return;
    }
    if (e.key.toLowerCase() === 'b' && !e.ctrlKey && !e.metaKey && !e.altKey
        && !isEditing() && !isFormFocused()) {
      e.preventDefault();
      deleteSelected();
      return;
    }
    // Alt + digit → centre the view on the bookmark with that number.
    if (e.altKey && !e.ctrlKey && !e.metaKey && !e.shiftKey
        && /^[0-9]$/.test(e.key)
        && !isEditing() && !isFormFocused()) {
      const num = parseInt(e.key, 10);
      for (const n of nodes.values()) {
        if (n.type === 'bookmark' && +n.number === num) {
          e.preventDefault();
          centerOnNode(n);
          return;
        }
      }
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') { state.spaceDown = false; wrap.classList.remove('space-down'); }
    if (!e.ctrlKey && !e.metaKey) setCtrlIndicator(false);
  });
  window.addEventListener('blur', () => {
    state.spaceDown = false; wrap.classList.remove('space-down');
    setCtrlIndicator(false);
  });

  // Block native HTML5 drag and stray text-selection so Ctrl+drag and
  // empty-area drag never get hijacked by the browser.
  document.addEventListener('dragstart',   (e) => e.preventDefault());
  document.addEventListener('selectstart', (e) => {
    if (!isEditing() && !isFormFocused()) e.preventDefault();
  });

  // ────────────────────────────────────────────────────────────────────
  // Universal Ctrl+drag → draw arrow.
  // Runs in CAPTURE phase at the window level so it always wins,
  // no matter what node/arrow/UI element is under the cursor.
  // ────────────────────────────────────────────────────────────────────
  window.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    const inUI = e.target && e.target.closest && (
          e.target.closest('#ctx-menu') ||
          e.target.closest('#style-popup') ||
          e.target.closest('#lightbox') ||
          e.target.closest('#mode-badge'));
    if (inUI) return;
    // Shift + Ctrl/Cmd + drag → draw a rectangle interactively.
    if ((e.ctrlKey || e.metaKey) && e.shiftKey) {
      e.preventDefault();
      e.stopPropagation();
      startShapeDrag(e, 'rect');
      return;
    }
    // Ctrl/Cmd alone (or arrow mode) → arrow drawing
    const wantArrow = (e.ctrlKey || e.metaKey || state.arrowMode);
    if (!wantArrow) return;
    e.preventDefault();
    e.stopPropagation();
    if (state.arrowMode) setArrowMode(false);
    startArrowFromMouse(e);
  }, true);

  /* ============================ DRAG-DROP IMAGES ============================ */

  /* ============================ CLIPBOARD PASTE ============================
     Ctrl+V anywhere on the canvas drops the clipboard content as a node:
     - image files (e.g. a screenshot in your clipboard) → image node
     - HTML containing <img src="…">                    → image node
     - a URL pointing at an image                       → image node
     - plain text                                       → text node
     Paste happens at the last mouse position (or the view centre if the
     pointer hasn't moved yet). Skipped while editing text or a form input
     so normal in-editor paste keeps working.                              */

  function _pastePosition() {
    if (_lastMouse.x === 0 && _lastMouse.y === 0) {
      const r = wrap.getBoundingClientRect();
      return toWorld(r.left + r.width / 2, r.top + r.height / 2);
    }
    return toWorld(_lastMouse.x, _lastMouse.y);
  }

  document.addEventListener('paste', (e) => {
    if (isEditing() || isFormFocused()) return;
    const cd = e.clipboardData;
    if (!cd) return;
    const w = _pastePosition();

    // 1) image FILE in the clipboard (e.g. system screenshot, copied image)
    if (cd.items) {
      let i = 0;
      for (const item of cd.items) {
        if (item.kind === 'file' && item.type.startsWith('image/')) {
          const f = item.getAsFile();
          if (f) {
            const reader = new FileReader();
            const off = i++ * 16;
            reader.onload = (ev) => createImageNode(w.x + off, w.y + off, ev.target.result);
            reader.readAsDataURL(f);
          }
        }
      }
      if (i > 0) { e.preventDefault(); return; }
    }
    if (cd.files && cd.files.length) {
      let i = 0;
      for (const f of cd.files) {
        if (!f.type.startsWith('image/')) continue;
        const reader = new FileReader();
        const off = i++ * 16;
        reader.onload = (ev) => createImageNode(w.x + off, w.y + off, ev.target.result);
        reader.readAsDataURL(f);
      }
      if (i > 0) { e.preventDefault(); return; }
    }

    // 2) HTML clipboard with an <img src=…> (paste from a web page)
    const html = cd.getData('text/html');
    if (html) {
      const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (m && m[1]) {
        e.preventDefault();
        createImageNode(w.x, w.y, m[1]);
        return;
      }
    }

    // 3) plain text — use it as an image src if it looks like one, else
    //    create a text node with the pasted text.
    const text = (cd.getData('text/plain') || cd.getData('text') || '').trim();
    if (text) {
      e.preventDefault();
      if (/^(https?:|data:|blob:)/i.test(text) &&
          (/\.(png|jpe?g|gif|webp|svg|bmp|avif)(\?|#|$)/i.test(text) || text.startsWith('data:image/'))) {
        createImageNode(w.x, w.y, text);
      } else {
        createTextNode(w.x, w.y, text, false);
      }
    }
  });

  wrap.addEventListener('dragover', (e) => { e.preventDefault(); });
  wrap.addEventListener('drop', (e) => {
    e.preventDefault();
    const w = toWorld(e.clientX, e.clientY);
    const dt = e.dataTransfer;
    if (!dt) return;
    if (dt.files && dt.files.length > 0) {
      let i = 0;
      for (const f of dt.files) {
        if (!f.type.startsWith('image/')) continue;
        const reader = new FileReader();
        const off = i++ * 16;
        reader.onload = (ev) => createImageNode(w.x + off, w.y + off, ev.target.result);
        reader.readAsDataURL(f);
      }
      if (i > 0) return;
    }
    const html = dt.getData('text/html');
    if (html) {
      const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (m) { createImageNode(w.x, w.y, m[1]); return; }
    }
    const url = (dt.getData('text/uri-list') || dt.getData('text/plain') || '')
                  .split('\n')[0].trim();
    if (url && /^(https?:|data:|blob:)/i.test(url)) createImageNode(w.x, w.y, url);
  });

  /* ============================ LIGHTBOX ============================ */

  let lbState = { scale: 1, x: 0, y: 0 };
  function applyLb() {
    lbImg.style.transform = `translate(${lbState.x}px, ${lbState.y}px) scale(${lbState.scale})`;
  }
  function openLightbox(src) {
    lbImg.src = src;
    lbState = { scale: 1, x: 0, y: 0 };
    applyLb();
    lb.classList.add('show');
  }
  function closeLightbox() { lb.classList.remove('show'); }
  lbClose.addEventListener('click', closeLightbox);
  lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });
  lb.addEventListener('wheel', (e) => {
    e.preventDefault();
    const old = lbState.scale;
    const ns  = Math.max(0.1, Math.min(10, old * Math.exp(-e.deltaY * 0.0015)));
    const rect = lbImg.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    const mx = e.clientX - cx;
    const my = e.clientY - cy;
    const f = ns / old;
    lbState.x = (lbState.x - mx) * f + mx;
    lbState.y = (lbState.y - my) * f + my;
    lbState.scale = ns;
    applyLb();
  }, { passive: false });
  lbImg.addEventListener('mousedown', (e) => {
    e.preventDefault(); e.stopPropagation();
    const start = { x: e.clientX, y: e.clientY };
    const sp = { x: lbState.x, y: lbState.y };
    lbImg.classList.add('dragging');
    bindDrag((ev) => {
      lbState.x = sp.x + (ev.clientX - start.x);
      lbState.y = sp.y + (ev.clientY - start.y);
      applyLb();
    }, () => lbImg.classList.remove('dragging'));
  });

  /* ============================ CONTEXT MENU ============================ */

  let _ctxWorldPos = null;

  function findItemFromTarget(el) {
    let n = el;
    while (n && n !== document.body) {
      if (n._mindNode)  return n._mindNode;
      if (n._mindArrow) return n._mindArrow;
      n = n.parentElement || n.parentNode;
    }
    return null;
  }

  function showContextMenu(e, target) {
    ctxMenu.innerHTML = '';
    _ctxWorldPos = toWorld(e.clientX, e.clientY);

    function addItem(label, action, opts) {
      const b = document.createElement('button');
      b.textContent = label;
      if (opts && opts.danger) b.className = 'danger';
      b.addEventListener('click', () => { hideContextMenu(); action(); });
      ctxMenu.appendChild(b);
    }
    function addSep() { ctxMenu.appendChild(document.createElement('hr')); }
    function addHint(text) {
      const d = document.createElement('div');
      d.className = 'hint'; d.textContent = text;
      ctxMenu.appendChild(d);
    }
    function addShapeRow(onPick) {
      const row = document.createElement('div');
      row.style.cssText =
        'display:flex; padding:0 12px 8px; gap:6px; flex-wrap:wrap;';
      SHAPE_WHEEL_ORDER.forEach(shape => {
        const btn = document.createElement('button');
        btn.style.cssText =
          'width:32px; height:32px; padding:0; font-size:18px;' +
          ' border:1px solid #e0e0e0; background:#fff; border-radius:6px;' +
          ' cursor:pointer; display:flex; align-items:center; justify-content:center;';
        btn.textContent = SHAPE_ICON[shape];
        btn.title = shape;
        btn.addEventListener('click', () => {
          hideContextMenu();
          onPick(shape);
        });
        row.appendChild(btn);
      });
      ctxMenu.appendChild(row);
    }

    if (target) {
      // Locked nodes get a minimal menu so the user can still unlock or delete.
      if (target.kind === 'node' && target.locked) {
        addItem('Unlock',  () => toggleLock(target));
        addSep();
        addItem('Delete',  () => { target.locked = false; deleteNode(target); }, { danger: true });
        ctxMenu.style.left = e.clientX + 'px';
        ctxMenu.style.top  = e.clientY + 'px';
        ctxMenu.classList.add('show');
        const rr = ctxMenu.getBoundingClientRect();
        if (rr.right  > window.innerWidth)  ctxMenu.style.left = (window.innerWidth  - rr.width  - 6) + 'px';
        if (rr.bottom > window.innerHeight) ctxMenu.style.top  = (window.innerHeight - rr.height - 6) + 'px';
        return;
      }

      if (!state.selected.has(target)) selectOnly(target);

      if (target.kind === 'node' && target.type === 'image') {
        addItem('Open / Zoom Image', () => openLightbox(target.src));
        addSep();
      }
      if (target.kind === 'node' && target.type === 'text') {
        addItem('Convert to Checkbox', () => convertNodeType(target, 'checkbox'));
        addSep();
      } else if (target.kind === 'node' && target.type === 'checkbox') {
        addItem('Convert to Text', () => convertNodeType(target, 'text'));
        addSep();
      } else if (target.kind === 'node' && target.type === 'shape') {
        addHint('Change shape:');
        addShapeRow((shape) => setShapeType(target, shape));
        addSep();
      }
      if (state.selected.size >= 2) {
        addItem('Align Left',     () => alignSelected('left'));
        addItem('Align Centre',   () => alignSelected('cx'));
        addItem('Align Right',    () => alignSelected('right'));
        addItem('Align Top',      () => alignSelected('top'));
        addItem('Align Middle',   () => alignSelected('cy'));
        addItem('Align Bottom',   () => alignSelected('bottom'));
        addItem('Distribute Horizontally…', () => distributeSelected('h'));
        addItem('Distribute Vertically…',   () => distributeSelected('v'));
        addSep();
      }
      addItem('Bring to Front (↑)', bringSelectedForward);
      addItem('Send to Back (↓)',   sendSelectedBackward);
      if (target.kind === 'node') {
        addSep();
        addItem('Lock', () => toggleLock(target));
      }
      addSep();
      addItem(state.selected.size > 1 ? `Delete ${state.selected.size} items (B)` : 'Delete (B)',
              deleteSelected, { danger: true });
    } else {
      const wp = _ctxWorldPos;
      addItem('Add Text Here',     () => createTextNode(wp.x, wp.y, '', true));
      addItem('Add Checkbox Here', () => createCheckboxNode(wp.x, wp.y, 'task', false));
      addItem('Add Image…',        () => fileInput.click());
      addItem('Draw Arrow (A)',    () => setArrowMode(true));
      addItem('Add Bookmark Here (Alt+digit jumps)', () => {
        const num = nextBookmarkNumber();
        selectOnly(createBookmarkNode(wp.x - 18, wp.y - 18, num));
      });
      addItem('Add Table Here', () => {
        selectOnly(createTableNode(wp.x, wp.y));
      });
      addSep();
      addHint('Add shape:');
      addShapeRow((shape) => {
        const w = 120, h = 100;
        selectOnly(createShapeNode(wp.x - w/2, wp.y - h/2, w, h, shape));
      });
      addSep();
      if (state.selected.size > 0) {
        addItem(`Bring Selected to Front (${state.selected.size}) ↑`, bringSelectedForward);
        addItem(`Send Selected to Back (${state.selected.size}) ↓`,   sendSelectedBackward);
        addItem(`Delete Selected (${state.selected.size})`,           deleteSelected, { danger: true });
        addSep();
      }
      addItem('Reset View', () => {
        view.x = 0; view.y = 0; view.scale = 1;
        applyTransform(); repositionStylePopup(); scheduleSave();
      });
      addItem('Clear Everything', () => {
        if (!confirm('Erase the entire mind map? This cannot be undone.')) return;
        _suppressSave = true;
        for (const n of [...nodes.values()]) n.el.remove();
        nodes.clear();
        for (const a of [...arrows.values()]) a.el.remove();
        arrows.clear();
        state.selected.clear();
        updateStylePopup();
        view.x = 0; view.y = 0; view.scale = 1;
        applyTransform();
        _suppressSave = false;
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      }, { danger: true });
      addSep();
      addHint('A = arrow mode · Ctrl+drag = arrow · Shift+Ctrl+drag = rectangle · V = menu · double-click empty = add text · Alt+click = cycle stacked · Space+drag = pan');
    }

    ctxMenu.style.left = e.clientX + 'px';
    ctxMenu.style.top  = e.clientY + 'px';
    ctxMenu.classList.add('show');
    const r = ctxMenu.getBoundingClientRect();
    if (r.right  > window.innerWidth)  ctxMenu.style.left = (window.innerWidth  - r.width  - 6) + 'px';
    if (r.bottom > window.innerHeight) ctxMenu.style.top  = (window.innerHeight - r.height - 6) + 'px';
  }

  function hideContextMenu() {
    ctxMenu.classList.remove('show');
    ctxMenu.innerHTML = '';
  }

  document.addEventListener('contextmenu', (e) => {
    if (e.target.closest && (e.target.closest('#lightbox') || e.target.closest('#ctx-menu') ||
                              e.target.closest('#style-popup'))) return;
    if (isEditing()) return;
    e.preventDefault();
    const target = findItemFromTarget(e.target);
    showContextMenu(e, target);
  });

  document.addEventListener('mousedown', (e) => {
    if (!ctxMenu.classList.contains('show')) return;
    if (e.target.closest && e.target.closest('#ctx-menu')) return;
    hideContextMenu();
  }, true);

  /* ============================ FILE INPUT ============================ */

  fileInput.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const w = _ctxWorldPos || (() => {
      const r = wrap.getBoundingClientRect();
      return toWorld(r.left + r.width / 2, r.top + r.height / 2);
    })();
    const reader = new FileReader();
    reader.onload = (ev) => createImageNode(w.x, w.y, ev.target.result);
    reader.readAsDataURL(f);
    fileInput.value = '';
  });

  window.addEventListener('resize', repositionStylePopup);

  /* ============================ INIT ============================ */

  loadNow().catch(e => console.warn('mindmap load failed', e));
  window.addEventListener('beforeunload', saveNow);
  // 'pagehide' fires more reliably than beforeunload on mobile and on tab
  // switches that the browser may suspend — extra safety net.
  window.addEventListener('pagehide', saveNow);
})();
</script>
</body>
</html>
