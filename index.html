<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mind Map</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    user-select: none; -webkit-user-select: none; }

  #canvas-wrap {
    position: fixed; inset: 0;
    background: #ffffff;
  }
  #canvas-wrap.space-down { cursor: grab; }
  #canvas-wrap.panning   { cursor: grabbing; }
  #canvas-wrap.ctrl-down,
  #canvas-wrap.ctrl-down .node,
  #canvas-wrap.ctrl-down .arrow .hit,
  #canvas-wrap.arrow-mode,
  #canvas-wrap.arrow-mode .node,
  #canvas-wrap.arrow-mode .arrow .hit { cursor: crosshair !important; }

  #mode-badge {
    position: fixed; top: 10px; right: 10px;
    background: #4a90e2; color: #fff;
    padding: 6px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    z-index: 200;
    display: none;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  #mode-badge.show { display: block; }

  #canvas {
    position: absolute; left: 0; top: 0;
    width: 0; height: 0;
    transform-origin: 0 0;
    overflow: visible;
  }
  /* arrows below nodes — node clicks are never swallowed by an arrow's hit area */
  #arrows {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  .node { position: absolute; user-select: none; }

  .node.text {
    white-space: pre;
    padding: 2px 4px;
    min-width: 14px;
    min-height: 1.3em;
    color: #1c1c1c;
    font-size: 16px;
    line-height: 1.35;
    cursor: move;
    outline: none;
    border: none;
    background: transparent;
  }
  .node.text[contenteditable="plaintext-only"],
  .node.text[contenteditable="true"] {
    cursor: text;
    user-select: text;
  }

  .node.image { cursor: move; line-height: 0; }
  .node.image img {
    display: block;
    max-width: 320px;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    border-radius: 2px;
  }

  .node.checkbox {
    display: flex; align-items: flex-start; gap: 6px;
    cursor: move;
    font-size: 16px; line-height: 1.35; color: #1c1c1c;
  }
  .node.checkbox input[type=checkbox] {
    margin: 3px 0 0 0; width: 16px; height: 16px;
    cursor: pointer; flex-shrink: 0;
  }
  .node.checkbox span {
    white-space: pre;
    padding: 0 2px;
    outline: none;
    user-select: none;
  }
  .node.checkbox span[contenteditable="plaintext-only"],
  .node.checkbox span[contenteditable="true"] {
    cursor: text; user-select: text;
  }
  .node.checkbox.checked span { text-decoration: line-through; color: #888; }

  .node.selected { outline: 1.5px dashed #4a90e2; outline-offset: 4px; border-radius: 3px; }

  .arrow .line { fill: none; stroke: #2c2c2c; stroke-width: 2; pointer-events: none; }
  /* narrow hit area at all times — wider widths swallow clicks meant for
     nearby empty space (which is how you deselect). */
  .arrow .hit  { fill: none; stroke: transparent; stroke-width: 6; pointer-events: stroke; cursor: pointer; }
  .arrow.selected .line  { stroke: #4a90e2; }
  .arrow.drafting .line  { stroke: #4a90e2; stroke-width: 2.5; stroke-dasharray: 6 4; }
  .arrow .start-dot { fill: #4a90e2; stroke: #ffffff; stroke-width: 1.5; pointer-events: none; }
  .waypoint {
    fill: #ffffff; stroke: #4a90e2; stroke-width: 1.5;
    cursor: grab; pointer-events: all;
    display: none; /* hidden until the arrow is selected */
  }
  .waypoint.endpoint { fill: #4a90e2; }
  .arrow.selected .waypoint { display: inline; }

  #file-input { display: none; }

  #marquee {
    position: fixed; pointer-events: none;
    border: 1.5px solid #4a90e2;
    background: rgba(74,144,226,0.10);
    z-index: 50;
  }

  #ctx-menu {
    position: fixed; z-index: 200;
    background: #ffffff;
    border: 1px solid #d8d8d8;
    border-radius: 8px;
    padding: 4px 0;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    min-width: 200px;
    font-size: 13px;
    user-select: none;
    display: none;
  }
  #ctx-menu.show { display: block; }
  #ctx-menu button {
    display: block; width: 100%; text-align: left;
    background: none; border: none; padding: 7px 14px;
    cursor: pointer; color: #232323;
    font: inherit;
  }
  #ctx-menu button:hover { background: #f1f5fb; }
  #ctx-menu button.danger { color: #c33; }
  #ctx-menu button.danger:hover { background: #fdecec; }
  #ctx-menu hr { margin: 4px 0; border: none; border-top: 1px solid #eee; }
  #ctx-menu .hint { padding: 4px 14px 6px; font-size: 11px; color: #888; line-height: 1.4; }

  #style-popup {
    position: fixed; display: none;
    background: #ffffff;
    border: 1px solid #d8d8d8;
    border-radius: 8px;
    padding: 4px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    z-index: 150;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    user-select: none;
  }
  #style-popup.show { display: flex; }
  #style-popup select,
  #style-popup input[type=number],
  #style-popup button {
    border: 1px solid #e0e0e0;
    border-radius: 5px;
    background: white;
    padding: 0 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    height: 28px;
    color: #333;
    line-height: 26px;
  }
  #style-popup input[type=number] { width: 54px; padding: 0 4px; cursor: text; }
  #style-popup button { min-width: 28px; }
  #style-popup button.active { background: #4a90e2; color: white; border-color: #4a90e2; }
  #style-popup .swatch {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 4px;
    border: 1px solid #e0e0e0;
    border-radius: 5px;
    height: 28px;
    color: #555;
    font-weight: 600;
  }
  #style-popup input[type=color] {
    border: none; padding: 0;
    width: 22px; height: 22px;
    cursor: pointer; background: none;
  }
  #style-popup .sep { width: 1px; height: 20px; background: #e8e8e8; margin: 0 2px; }

  #lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; overflow: hidden;
  }
  #lightbox.show { display: flex; }
  #lightbox img {
    transform-origin: center center;
    user-select: none; -webkit-user-drag: none;
    cursor: grab; max-width: none; max-height: none;
  }
  #lightbox img.dragging { cursor: grabbing; }
  #lb-close {
    position: absolute; top: 10px; right: 16px; color: white;
    font-size: 32px; cursor: pointer; user-select: none;
    background: none; border: none; line-height: 1;
  }
  #lb-hint {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    color: #ccc; font-size: 12px; pointer-events: none;
  }
</style>
</head>
<body>

<div id="canvas-wrap">
  <!-- arrows BEFORE the canvas: nodes render on top, so node clicks are never blocked -->
  <svg id="arrows" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
        markerUnits="strokeWidth" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c2c2c"/>
      </marker>
      <marker id="arrowhead-draft" viewBox="0 0 10 10" refX="9" refY="5"
        markerUnits="strokeWidth" markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a90e2"/>
      </marker>
    </defs>
    <g id="arrows-layer"></g>
  </svg>
  <div id="canvas"></div>
</div>

<div id="ctx-menu"></div>
<div id="mode-badge"></div>

<div id="style-popup">
  <select id="sp-font" title="Font">
    <option value="">Sans</option>
    <option value="Georgia, 'Times New Roman', serif">Serif</option>
    <option value="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace">Mono</option>
    <option value="'Comic Sans MS', 'Comic Sans', cursive">Casual</option>
    <option value="Impact, 'Arial Black', sans-serif">Display</option>
  </select>
  <input id="sp-size" type="number" min="8" max="200" step="1" value="16" title="Font size">
  <span class="sep"></span>
  <button id="sp-bold"      title="Bold"><b>B</b></button>
  <button id="sp-italic"    title="Italic"><i>I</i></button>
  <button id="sp-underline" title="Underline"><u>U</u></button>
  <span class="sep"></span>
  <label class="swatch" title="Text color">A<input id="sp-color" type="color" value="#1c1c1c"></label>
  <label class="swatch" title="Stroke (outline) color">▣<input id="sp-stroke-color" type="color" value="#000000"></label>
  <select id="sp-stroke-width" title="Stroke width">
    <option value="0">no stroke</option>
    <option value="1">stroke 1</option>
    <option value="2">stroke 2</option>
    <option value="3">stroke 3</option>
  </select>
</div>

<input id="file-input" type="file" accept="image/*">

<div id="lightbox">
  <button id="lb-close" title="Close (Esc)">&times;</button>
  <img id="lb-img" alt="">
  <div id="lb-hint">Wheel = zoom &nbsp; · &nbsp; Drag = pan &nbsp; · &nbsp; Esc = close</div>
</div>

<script>
(function () {
  const wrap        = document.getElementById('canvas-wrap');
  const canvas      = document.getElementById('canvas');
  const arrowsSvg   = document.getElementById('arrows');
  const arrowsLayer = document.getElementById('arrows-layer');
  const fileInput  = document.getElementById('file-input');
  const lb         = document.getElementById('lightbox');
  const lbImg      = document.getElementById('lb-img');
  const lbClose    = document.getElementById('lb-close');
  const ctxMenu    = document.getElementById('ctx-menu');
  const modeBadge  = document.getElementById('mode-badge');
  const stylePopup = document.getElementById('style-popup');
  const spFont     = document.getElementById('sp-font');
  const spSize     = document.getElementById('sp-size');
  const spBold     = document.getElementById('sp-bold');
  const spItalic   = document.getElementById('sp-italic');
  const spULine    = document.getElementById('sp-underline');
  const spColor    = document.getElementById('sp-color');
  const spStrokeC  = document.getElementById('sp-stroke-color');
  const spStrokeW  = document.getElementById('sp-stroke-width');

  const SVG_NS = 'http://www.w3.org/2000/svg';

  const view   = { x: 0, y: 0, scale: 1 };
  const nodes  = new Map();
  const arrows = new Map();
  let nextId = 1;
  const newId = () => 'n' + (nextId++);

  const state = {
    spaceDown: false,
    ctrlDown: false,
    arrowMode: false,
    selected: new Set(),
  };
  const _lastMouse = { x: 0, y: 0 };

  function setArrowMode(on) {
    state.arrowMode = !!on;
    wrap.classList.toggle('arrow-mode', state.arrowMode);
    if (state.arrowMode) {
      modeBadge.textContent = '✎  Arrow mode — click + drag to draw   (Esc to cancel)';
      modeBadge.classList.add('show');
    } else {
      modeBadge.classList.remove('show');
    }
  }

  function applyTransform() {
    canvas.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
    // Use SVG-native transform attribute on the inner layer.
    // CSS transform on a width:0/height:0 SVG renders nothing in some browsers
    // (the cause of arrows never appearing on screen).
    arrowsLayer.setAttribute(
      'transform',
      `translate(${view.x},${view.y}) scale(${view.scale})`
    );
  }
  applyTransform();

  function toWorld(sx, sy) { return { x: (sx - view.x) / view.scale, y: (sy - view.y) / view.scale }; }
  function toScreen(wx, wy){ return { x:  wx * view.scale + view.x,   y:  wy * view.scale + view.y   }; }

  function isEditing() {
    const ae = document.activeElement;
    return !!(ae && ae.isContentEditable);
  }
  function isFormFocused() {
    const ae = document.activeElement;
    if (!ae) return false;
    const t = ae.tagName;
    return t === 'INPUT' || t === 'SELECT' || t === 'TEXTAREA';
  }

  /* ============================ DRAG HELPER ============================
     Centralised drag binding: guarantees listeners are always cleaned up,
     even if the window loses focus or the user releases outside the window
     or hits Escape mid-drag. Fixes "drag gets stuck" symptoms.            */

  const _activeDrags = new Set();
  function bindDrag(mv, up) {
    let done = false;
    function cleanup() {
      if (done) return;
      done = true;
      document.removeEventListener('mousemove', mv);
      document.removeEventListener('mouseup', upWrap);
      _activeDrags.delete(cleanup);
    }
    function upWrap(ev) {
      try { if (up) up(ev); } catch (e) { console.error(e); }
      cleanup();
    }
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', upWrap);
    _activeDrags.add(cleanup);
    return cleanup;
  }
  function abortAllDrags() { for (const c of [..._activeDrags]) c(); }
  window.addEventListener('blur', abortAllDrags);
  document.addEventListener('visibilitychange', () => { if (document.hidden) abortAllDrags(); });
  // NOTE: window 'mouseleave' was intentionally removed — it fires when the
  // cursor briefly exits the browser viewport, which kills in-flight drags
  // (the cause of Ctrl+drag arrows silently dying mid-gesture).

  /* ============================ PERSISTENCE ============================
     Primary store: IndexedDB (large quota — fits embedded image data URLs).
     Fallback: localStorage with image data URLs stripped, for the rare case
     IndexedDB is unavailable (e.g. private mode in some browsers).         */

  const STORAGE_KEY = 'mindmap.v1';
  const IDB_NAME = 'mindmap', IDB_STORE = 'state', IDB_KEY = 'main';

  let _suppressSave = false;
  let _saveTimer = null;
  let _dbPromise = null;

  function _openDb() {
    if (_dbPromise) return _dbPromise;
    if (!window.indexedDB) return Promise.reject(new Error('no indexedDB'));
    _dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
    return _dbPromise;
  }
  function _idbPut(value) {
    return _openDb().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(value, IDB_KEY);
      tx.oncomplete = () => resolve();
      tx.onerror    = () => reject(tx.error);
      tx.onabort    = () => reject(tx.error);
    }));
  }
  function _idbGet() {
    return _openDb().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(IDB_KEY);
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    }));
  }

  function buildSnapshot() {
    const ns = [];
    for (const el of canvas.children) {
      const n = el._mindNode;
      if (!n) continue;
      const base = { type: n.type, x: n.x, y: n.y };
      if (n.style && Object.keys(n.style).length) base.style = n.style;
      if (n.type === 'text')          ns.push({ ...base, text: n.el.textContent });
      else if (n.type === 'image')    ns.push({ ...base, src: n.src });
      else if (n.type === 'checkbox') ns.push({ ...base, text: n.span.textContent, checked: !!n.cb.checked });
    }
    const ar = [];
    for (const el of arrowsLayer.children) {
      const a = el._mindArrow;
      if (!a) continue;
      ar.push({ points: a.points.map(p => ({ x: +p.x, y: +p.y })) });
    }
    return { view: { x: view.x, y: view.y, scale: view.scale }, nodes: ns, arrows: ar };
  }

  function scheduleSave() {
    if (_suppressSave) return;
    if (_saveTimer) return;
    _saveTimer = setTimeout(() => { _saveTimer = null; saveNow(); }, 250);
  }

  function saveNow() {
    if (_suppressSave) return;
    const data = buildSnapshot();
    // Primary: IndexedDB (handles big image blobs).
    _idbPut(data).catch(e => console.warn('idb save failed', e));
    // Mirror to localStorage too — minus heavy image data URLs — so the
    // basic state is still recoverable if IndexedDB is unavailable.
    try {
      const lsData = {
        ...data,
        nodes: data.nodes.map(n =>
          (n.type === 'image' && typeof n.src === 'string' && n.src.length > 4000)
            ? { ...n, src: '' }
            : n
        ),
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lsData));
    } catch (e) { /* quota — IDB is primary */ }
  }

  function applySnapshot(data) {
    _suppressSave = true;
    try {
      if (data.view) {
        view.x = +data.view.x || 0;
        view.y = +data.view.y || 0;
        view.scale = +data.view.scale || 1;
        applyTransform();
      }
      if (Array.isArray(data.nodes)) {
        for (const n of data.nodes) {
          let node = null;
          if (n.type === 'text')             node = createTextNode(+n.x || 0, +n.y || 0, n.text || '', false);
          else if (n.type === 'image' && n.src) node = createImageNode(+n.x || 0, +n.y || 0, n.src);
          else if (n.type === 'checkbox')    node = createCheckboxNode(+n.x || 0, +n.y || 0, n.text || '', !!n.checked);
          if (node && n.style) { node.style = n.style; applyNodeStyle(node); }
        }
      }
      if (Array.isArray(data.arrows)) {
        for (const a of data.arrows) {
          if (a.points && a.points.length >= 2)
            createArrow(a.points.map(p => ({ x: +p.x, y: +p.y })));
        }
      }
    } finally { _suppressSave = false; }
  }

  async function loadNow() {
    let data = null;
    // Prefer IndexedDB (it's the primary store and has full image data).
    try { data = await _idbGet(); } catch (e) { /* no idb */ }
    // Fall back to legacy localStorage if IDB had nothing.
    if (!data) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) data = JSON.parse(raw);
      } catch (e) {}
    }
    if (!data) return;
    applySnapshot(data);
    // After a successful load, mirror back to IDB so any localStorage-only
    // legacy state graduates into the proper store.
    saveNow();
  }

  /* ============================ SELECTION ============================ */

  function clearSelection() {
    for (const it of state.selected) it.el.classList.remove('selected');
    state.selected.clear();
    updateStylePopup();
  }
  function addToSelection(item) {
    if (!item) return;
    state.selected.add(item);
    item.el.classList.add('selected');
    updateStylePopup();
  }
  function selectOnly(item) {
    for (const it of state.selected) it.el.classList.remove('selected');
    state.selected.clear();
    if (item) {
      state.selected.add(item);
      item.el.classList.add('selected');
    }
    updateStylePopup();
  }
  function toggleSelect(item) {
    if (state.selected.has(item)) {
      state.selected.delete(item);
      item.el.classList.remove('selected');
    } else {
      state.selected.add(item);
      item.el.classList.add('selected');
    }
    updateStylePopup();
  }
  function getSelectedNodes()  { return [...state.selected].filter(it => it.kind === 'node'); }
  function getSelectedArrows() { return [...state.selected].filter(it => it.kind === 'arrow'); }

  /* Find every node under a screen point (topmost first). Used by Alt+click. */
  function findNodesAtPoint(x, y) {
    const els = (document.elementsFromPoint && document.elementsFromPoint(x, y)) || [];
    const items = [];
    for (const el of els) {
      let n = el;
      while (n && n !== document.body) {
        if (n._mindNode && !items.includes(n._mindNode)) { items.push(n._mindNode); break; }
        n = n.parentElement || n.parentNode;
      }
    }
    return items;
  }

  /* ============================ EDIT HELPER ============================ */

  function makeEditable(el, onCommit) {
    if (el.getAttribute('contenteditable') === 'plaintext-only' ||
        el.getAttribute('contenteditable') === 'true') return;
    try { el.contentEditable = 'plaintext-only'; }
    catch (e) { el.contentEditable = 'true'; }
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    function kd(e) {
      if (e.key === 'Escape') { e.preventDefault(); el.blur(); }
      if (el.contentEditable !== 'plaintext-only' && e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.execCommand && document.execCommand('insertText', false, '\n');
      }
    }
    function blur() {
      el.removeEventListener('blur', blur);
      el.removeEventListener('keydown', kd);
      el.contentEditable = 'false';
      if (onCommit) onCommit();
    }
    el.addEventListener('blur', blur);
    el.addEventListener('keydown', kd);
  }

  /* ============================ NODES ============================ */

  function setNodePos(node, x, y) {
    node.x = x; node.y = y;
    node.el.style.left = x + 'px';
    node.el.style.top  = y + 'px';
  }

  // Translate every selected node AND every selected arrow as one rigid group.
  // Used by node-drag and by clicking on an arrow line to drag the arrow itself.
  // If `deselectOnNoMove` is provided and the user releases without dragging
  // past the 3 px threshold, that item is removed from the selection — gives
  // an obvious "click to deselect" affordance for arrows.
  function startMoveDrag(e, deselectOnNoMove) {
    const ns = getSelectedNodes();
    const as = getSelectedArrows();
    if (!ns.length && !as.length) return;
    const startMouse = { x: e.clientX, y: e.clientY };
    const startNodePos = new Map();
    for (const n of ns) startNodePos.set(n, { x: n.x, y: n.y });
    const startArrowPts = new Map();
    for (const a of as) startArrowPts.set(a, a.points.map(p => ({ x: p.x, y: p.y })));
    let didMove = false;

    bindDrag((ev) => {
      if (!didMove) {
        const d = Math.abs(ev.clientX - startMouse.x) + Math.abs(ev.clientY - startMouse.y);
        if (d > 3) didMove = true;
      }
      if (!didMove) return;
      const dx = (ev.clientX - startMouse.x) / view.scale;
      const dy = (ev.clientY - startMouse.y) / view.scale;
      for (const n of ns) {
        const sp = startNodePos.get(n);
        setNodePos(n, sp.x + dx, sp.y + dy);
      }
      for (const a of as) {
        const orig = startArrowPts.get(a);
        a.points = orig.map(p => ({ x: p.x + dx, y: p.y + dy }));
        renderArrow(a);
      }
      repositionStylePopup();
    }, () => {
      if (didMove) scheduleSave();
      else if (deselectOnNoMove && state.selected.has(deselectOnNoMove)) {
        state.selected.delete(deselectOnNoMove);
        deselectOnNoMove.el.classList.remove('selected');
        updateStylePopup();
      }
    });
  }

  function attachNodeDrag(node) {
    node.el.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (state.spaceDown) return;
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault(); e.stopPropagation();
        startArrowFromMouse(e);
        return;
      }
      // Alt+click → cycle through stacked nodes at this point
      if (e.altKey && !e.shiftKey) {
        e.preventDefault(); e.stopPropagation();
        const list = findNodesAtPoint(e.clientX, e.clientY);
        if (list.length > 1) {
          let idx = -1;
          for (let i = 0; i < list.length; i++)
            if (state.selected.has(list[i])) { idx = i; break; }
          selectOnly(list[(idx + 1) % list.length]);
        } else {
          selectOnly(node);
        }
        return;
      }
      if (isEditing() && (node.el.contains(document.activeElement) ||
                          node.el === document.activeElement)) {
        e.stopPropagation();
        return;
      }
      e.stopPropagation();
      hideContextMenu();

      if (e.shiftKey) {
        toggleSelect(node);
        if (!state.selected.has(node)) return;
      } else if (!state.selected.has(node)) {
        selectOnly(node);
      }
      startMoveDrag(e);
    });
  }

  function deleteNode(node) {
    node.el.remove();
    nodes.delete(node.id);
    state.selected.delete(node);
    updateStylePopup();
    scheduleSave();
  }

  function createTextNode(x, y, text, autoEdit) {
    const el = document.createElement('div');
    el.className = 'node text';
    el.textContent = text == null ? '' : text;
    canvas.appendChild(el);
    const node = { id: newId(), kind: 'node', type: 'text', el, x: 0, y: 0, style: {} };
    el._mindNode = node;
    setNodePos(node, x, y);
    nodes.set(node.id, node);
    attachNodeDrag(node);
    el.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      makeEditable(el, () => {
        if (el.textContent.replace(/\s+/g, '') === '') deleteNode(node);
        else { scheduleSave(); repositionStylePopup(); }
      });
    });
    if (autoEdit) {
      requestAnimationFrame(() => makeEditable(el, () => {
        if (el.textContent.replace(/\s+/g, '') === '') deleteNode(node);
        else { scheduleSave(); repositionStylePopup(); }
      }));
    }
    scheduleSave();
    return node;
  }

  function createImageNode(x, y, src) {
    const el = document.createElement('div');
    el.className = 'node image';
    const img = document.createElement('img');
    img.src = src;
    img.draggable = false;
    el.appendChild(img);
    canvas.appendChild(el);
    const node = { id: newId(), kind: 'node', type: 'image', el, x: 0, y: 0, src, img };
    el._mindNode = node;
    setNodePos(node, x, y);
    nodes.set(node.id, node);
    attachNodeDrag(node);
    el.addEventListener('dblclick', (e) => { e.stopPropagation(); openLightbox(src); });
    // Images are heavy — save IMMEDIATELY (not via the 250 ms debounce) so a
    // quick tab close right after dropping an image still persists it.
    saveNow();
    return node;
  }

  function createCheckboxNode(x, y, text, checked) {
    const el = document.createElement('div');
    el.className = 'node checkbox' + (checked ? ' checked' : '');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !!checked;
    cb.addEventListener('mousedown', (e) => e.stopPropagation());
    cb.addEventListener('click', () => {
      el.classList.toggle('checked', cb.checked);
      scheduleSave();
    });
    const span = document.createElement('span');
    span.textContent = text == null ? '' : text;
    el.appendChild(cb);
    el.appendChild(span);
    canvas.appendChild(el);
    const node = { id: newId(), kind: 'node', type: 'checkbox', el, x: 0, y: 0, span, cb, style: {} };
    el._mindNode = node;
    setNodePos(node, x, y);
    nodes.set(node.id, node);
    attachNodeDrag(node);
    span.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      makeEditable(span, () => { scheduleSave(); repositionStylePopup(); });
    });
    scheduleSave();
    return node;
  }

  /* ============================ STYLE APPLY ============================ */

  function nodeStyleEl(node) {
    if (!node) return null;
    if (node.type === 'text') return node.el;
    if (node.type === 'checkbox') return node.span;
    return null;
  }
  function applyNodeStyle(node) {
    const el = nodeStyleEl(node); if (!el) return;
    const s = node.style || {};
    el.style.fontFamily      = s.fontFamily || '';
    el.style.fontSize        = s.fontSize ? (s.fontSize + 'px') : '';
    el.style.fontWeight      = s.bold      ? '700'      : '';
    el.style.fontStyle       = s.italic    ? 'italic'   : '';
    el.style.textDecoration  = s.underline ? 'underline': '';
    el.style.color           = s.color || '';
    if (s.strokeWidth && +s.strokeWidth > 0)
      el.style.webkitTextStroke = (+s.strokeWidth) + 'px ' + (s.strokeColor || '#000000');
    else
      el.style.webkitTextStroke = '';
  }

  /* ============================ STYLE POPUP ============================ */

  let _styledNode = null;
  function repositionStylePopup() {
    if (!_styledNode || !stylePopup.classList.contains('show')) return;
    const r = _styledNode.el.getBoundingClientRect();
    const ph = stylePopup.offsetHeight || 36;
    const pw = stylePopup.offsetWidth  || 360;
    let top  = r.top - ph - 10;
    if (top < 8) top = r.bottom + 10;
    let left = r.left + (r.width - pw) / 2;
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    if (left < 8) left = 8;
    stylePopup.style.left = left + 'px';
    stylePopup.style.top  = top  + 'px';
  }
  function updateStylePopup() {
    const sel = [...state.selected];
    const styleable = sel.length === 1 && sel[0].kind === 'node' &&
                      (sel[0].type === 'text' || sel[0].type === 'checkbox');
    if (!styleable) {
      _styledNode = null;
      stylePopup.classList.remove('show');
      return;
    }
    _styledNode = sel[0];
    const s = _styledNode.style || {};
    spFont.value     = s.fontFamily || '';
    spSize.value     = s.fontSize    || 16;
    spBold.classList.toggle  ('active', !!s.bold);
    spItalic.classList.toggle('active', !!s.italic);
    spULine.classList.toggle ('active', !!s.underline);
    spColor.value    = s.color       || '#1c1c1c';
    spStrokeC.value  = s.strokeColor || '#000000';
    spStrokeW.value  = s.strokeWidth || 0;
    stylePopup.classList.add('show');
    requestAnimationFrame(repositionStylePopup);
  }
  function setStyleProp(prop, value) {
    if (!_styledNode) return;
    if (!_styledNode.style) _styledNode.style = {};
    _styledNode.style[prop] = value;
    applyNodeStyle(_styledNode);
    repositionStylePopup();
    scheduleSave();
  }

  stylePopup.addEventListener('mousedown', (e) => e.stopPropagation());
  spFont.addEventListener   ('change', () => setStyleProp('fontFamily',  spFont.value));
  spSize.addEventListener   ('input',  () => setStyleProp('fontSize',    Math.max(8, Math.min(200, +spSize.value || 16))));
  spColor.addEventListener  ('input',  () => setStyleProp('color',       spColor.value));
  spStrokeC.addEventListener('input',  () => setStyleProp('strokeColor', spStrokeC.value));
  spStrokeW.addEventListener('change', () => setStyleProp('strokeWidth', +spStrokeW.value));
  spBold.addEventListener   ('click',  () => {
    const v = !(_styledNode && _styledNode.style && _styledNode.style.bold);
    setStyleProp('bold', v); spBold.classList.toggle('active', v);
  });
  spItalic.addEventListener ('click',  () => {
    const v = !(_styledNode && _styledNode.style && _styledNode.style.italic);
    setStyleProp('italic', v); spItalic.classList.toggle('active', v);
  });
  spULine.addEventListener  ('click',  () => {
    const v = !(_styledNode && _styledNode.style && _styledNode.style.underline);
    setStyleProp('underline', v); spULine.classList.toggle('active', v);
  });

  /* ============================ ARROWS ============================ */

  function createArrow(points) {
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('class', 'arrow');
    arrowsLayer.appendChild(g);
    const arrow = { id: newId(), kind: 'arrow', el: g, points };
    g._mindArrow = arrow;
    arrows.set(arrow.id, arrow);
    renderArrow(arrow);
    return arrow;
  }
  function deleteArrow(arrow) {
    arrow.el.remove();
    arrows.delete(arrow.id);
    state.selected.delete(arrow);
    updateStylePopup();
    scheduleSave();
  }
  function pointToSegmentDist(p, a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
    let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(p.x - (a.x + t * dx), p.y - (a.y + t * dy));
  }
  function renderArrow(arrow) {
    const pts = arrow.points;
    while (arrow.el.firstChild) arrow.el.removeChild(arrow.el.firstChild);
    if (pts.length < 2) return;
    const drafting = arrow.el.classList.contains('drafting');
    const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');

    const hit = document.createElementNS(SVG_NS, 'path');
    hit.setAttribute('class', 'hit');
    hit.setAttribute('d', d);
    hit.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault(); e.stopPropagation();
        startArrowFromMouse(e);
        return;
      }
      e.stopPropagation();
      hideContextMenu();
      if (e.shiftKey) {
        toggleSelect(arrow);
        if (!state.selected.has(arrow)) return;
        startMoveDrag(e);
        return;
      }
      const wasSelected = state.selected.has(arrow);
      if (!wasSelected) selectOnly(arrow);
      // If this arrow is the sole selection, a no-drag click DESELECTS it
      // (so users have an obvious way to "click off" an arrow). Drag still
      // translates the arrow normally.
      const sole = wasSelected && state.selected.size === 1;
      startMoveDrag(e, sole ? arrow : null);
    });
    hit.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const w = toWorld(e.clientX, e.clientY);
      let bestIdx = 1, bestDist = Infinity;
      for (let i = 0; i < pts.length - 1; i++) {
        const d2 = pointToSegmentDist(w, pts[i], pts[i + 1]);
        if (d2 < bestDist) { bestDist = d2; bestIdx = i + 1; }
      }
      pts.splice(bestIdx, 0, w);
      renderArrow(arrow);
      scheduleSave();
    });
    arrow.el.appendChild(hit);

    const line = document.createElementNS(SVG_NS, 'path');
    line.setAttribute('class', 'line');
    line.setAttribute('d', d);
    line.setAttribute('marker-end', drafting ? 'url(#arrowhead-draft)' : 'url(#arrowhead)');
    arrow.el.appendChild(line);

    // While drafting an arrow, show a visible dot at the start so the
    // user gets instant feedback that Ctrl+drag was registered, even
    // before the cursor has moved.
    if (drafting) {
      const dot = document.createElementNS(SVG_NS, 'circle');
      dot.setAttribute('class', 'start-dot');
      dot.setAttribute('cx', pts[0].x);
      dot.setAttribute('cy', pts[0].y);
      dot.setAttribute('r', 4);
      arrow.el.appendChild(dot);
    }

    pts.forEach((p, i) => {
      const c = document.createElementNS(SVG_NS, 'circle');
      const isEnd = (i === 0 || i === pts.length - 1);
      c.setAttribute('class', 'waypoint' + (isEnd ? ' endpoint' : ''));
      c.setAttribute('cx', p.x);
      c.setAttribute('cy', p.y);
      c.setAttribute('r', isEnd ? 5 : 4);
      c.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        if (e.ctrlKey || e.metaKey) {
          e.preventDefault(); e.stopPropagation();
          startArrowFromMouse(e);
          return;
        }
        e.preventDefault(); e.stopPropagation();
        if (!state.selected.has(arrow)) selectOnly(arrow);
        const startMouse = { x: e.clientX, y: e.clientY };
        const startP = { x: pts[i].x, y: pts[i].y };
        bindDrag((ev) => {
          const dx = (ev.clientX - startMouse.x) / view.scale;
          const dy = (ev.clientY - startMouse.y) / view.scale;
          pts[i] = { x: startP.x + dx, y: startP.y + dy };
          renderArrow(arrow);
        }, () => scheduleSave());
      });
      c.addEventListener('dblclick', (e) => {
        if (i > 0 && i < pts.length - 1) {
          e.stopPropagation();
          pts.splice(i, 1);
          renderArrow(arrow);
          scheduleSave();
        }
      });
      arrow.el.appendChild(c);
    });
  }

  function startArrowFromMouse(e) {
    hideContextMenu();
    const start = toWorld(e.clientX, e.clientY);
    const points = [{ x: start.x, y: start.y }, { x: start.x, y: start.y }];
    const arrow = createArrow(points);
    arrow.el.classList.add('drafting');
    renderArrow(arrow);

    bindDrag((ev) => {
      const w = toWorld(ev.clientX, ev.clientY);
      points[points.length - 1] = w;
      renderArrow(arrow);
    }, () => {
      const s  = points[0];
      const e2 = points[points.length - 1];
      if (Math.hypot(e2.x - s.x, e2.y - s.y) < 6 / view.scale) {
        deleteArrow(arrow);
        return;
      }
      const wp1 = { x: s.x + (e2.x - s.x) / 3,     y: s.y + (e2.y - s.y) / 3     };
      const wp2 = { x: s.x + 2 * (e2.x - s.x) / 3, y: s.y + 2 * (e2.y - s.y) / 3 };
      arrow.points = [s, wp1, wp2, e2];
      arrow.el.classList.remove('drafting');
      renderArrow(arrow);
      selectOnly(arrow);
      scheduleSave();
    });
  }

  /* ============================ MARQUEE ============================ */

  function rectsOverlap(a, b) {
    return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
  }
  function pointInRect(x, y, r) {
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }
  function startMarquee(e) {
    const startX = e.clientX, startY = e.clientY;
    const additive = e.shiftKey;
    const initial = new Set(state.selected);
    let didMove = false;
    let box = null;
    bindDrag((ev) => {
      const x = Math.min(startX, ev.clientX);
      const y = Math.min(startY, ev.clientY);
      const w = Math.abs(ev.clientX - startX);
      const h = Math.abs(ev.clientY - startY);
      if (!didMove && (w + h) > 3) {
        didMove = true;
        box = document.createElement('div');
        box.id = 'marquee';
        document.body.appendChild(box);
      }
      if (!didMove) return;
      box.style.left = x + 'px'; box.style.top = y + 'px';
      box.style.width = w + 'px'; box.style.height = h + 'px';

      const mr = { left: x, top: y, right: x + w, bottom: y + h };
      const inside = new Set();
      for (const n of nodes.values()) {
        const br = n.el.getBoundingClientRect();
        if (rectsOverlap(mr, br)) inside.add(n);
      }
      for (const a of arrows.values()) {
        for (const p of a.points) {
          const sp = toScreen(p.x, p.y);
          if (pointInRect(sp.x, sp.y, mr)) { inside.add(a); break; }
        }
      }
      for (const it of [...state.selected]) {
        if (!inside.has(it) && !(additive && initial.has(it))) {
          state.selected.delete(it);
          it.el.classList.remove('selected');
        }
      }
      if (additive) for (const it of initial) {
        if (!state.selected.has(it)) { state.selected.add(it); it.el.classList.add('selected'); }
      }
      for (const it of inside) {
        if (!state.selected.has(it)) { state.selected.add(it); it.el.classList.add('selected'); }
      }
      updateStylePopup();
    }, () => {
      if (box) box.remove();
      if (!didMove && !additive) clearSelection();
    });
  }

  /* ============================ PAN / ZOOM / EMPTY ============================ */

  wrap.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    hideContextMenu();
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      startArrowFromMouse(e);
      return;
    }
    if (state.spaceDown) {
      e.preventDefault();
      wrap.classList.add('panning');
      const startMouse = { x: e.clientX, y: e.clientY };
      const startView  = { x: view.x, y: view.y };
      bindDrag((ev) => {
        view.x = startView.x + (ev.clientX - startMouse.x);
        view.y = startView.y + (ev.clientY - startMouse.y);
        applyTransform();
        repositionStylePopup();
      }, () => { wrap.classList.remove('panning'); scheduleSave(); });
      return;
    }
    startMarquee(e);
  });

  // DOUBLE-CLICK on empty area → add a text node where the user clicked.
  wrap.addEventListener('dblclick', (e) => {
    if (e.target !== wrap && e.target !== canvas && e.target !== arrowsSvg) return;
    if (e.ctrlKey || e.metaKey || e.shiftKey || e.altKey || state.spaceDown) return;
    const w = toWorld(e.clientX, e.clientY);
    createTextNode(w.x, w.y, '', true);
  });

  wrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = -e.deltaY * 0.0015;
    const oldScale = view.scale;
    const newScale = Math.max(0.15, Math.min(5, oldScale * Math.exp(delta)));
    const rect = wrap.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const wx = (mx - view.x) / oldScale;
    const wy = (my - view.y) / oldScale;
    view.scale = newScale;
    view.x = mx - wx * newScale;
    view.y = my - wy * newScale;
    applyTransform();
    repositionStylePopup();
    scheduleSave();
  }, { passive: false });

  /* ============================ KEYBOARD ============================ */

  function bringSelectedForward() {
    const ns = getSelectedNodes();
    const as = getSelectedArrows();
    for (const n of ns) canvas.appendChild(n.el);
    for (const a of as) arrowsLayer.appendChild(a.el);
    if (ns.length || as.length) { scheduleSave(); return true; }
    return false;
  }
  function sendSelectedBackward() {
    const ns = getSelectedNodes();
    const as = getSelectedArrows();
    for (let i = ns.length - 1; i >= 0; i--) {
      const first = canvas.firstChild;
      if (first && first !== ns[i].el) canvas.insertBefore(ns[i].el, first);
    }
    for (const a of as) {
      const ref = arrowsLayer.firstChild;
      if (ref && a.el !== ref) arrowsLayer.insertBefore(a.el, ref);
    }
    if (ns.length || as.length) { scheduleSave(); return true; }
    return false;
  }
  function deleteSelected() {
    for (const it of [...state.selected]) {
      if (it.kind === 'node') deleteNode(it);
      else if (it.kind === 'arrow') deleteArrow(it);
    }
  }

  function setCtrlIndicator(on) {
    if (on === state.ctrlDown) return;
    state.ctrlDown = on;
    wrap.classList.toggle('ctrl-down', on);
  }

  window.addEventListener('mousemove', (e) => {
    _lastMouse.x = e.clientX; _lastMouse.y = e.clientY;
  });

  window.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && !state.ctrlDown) setCtrlIndicator(true);

    if (e.code === 'Space' && !isEditing()) {
      if (!state.spaceDown) { state.spaceDown = true; wrap.classList.add('space-down'); }
      e.preventDefault();
      return;
    }
    if (e.key === 'Delete' && !isEditing()) { deleteSelected(); return; }
    if (e.key === 'ArrowUp'   && !isEditing()) { if (bringSelectedForward())  e.preventDefault(); return; }
    if (e.key === 'ArrowDown' && !isEditing()) { if (sendSelectedBackward())  e.preventDefault(); return; }
    if (e.key === 'Escape') {
      abortAllDrags();
      if (state.arrowMode) { setArrowMode(false); return; }
      if (lb.classList.contains('show')) closeLightbox();
      else if (ctxMenu.classList.contains('show')) hideContextMenu();
      else clearSelection();
      return;
    }
    // A = toggle arrow drawing mode (alternative to Ctrl+drag)
    if (e.key.toLowerCase() === 'a' && !e.ctrlKey && !e.metaKey && !e.altKey
        && !isEditing() && !isFormFocused()) {
      e.preventDefault();
      setArrowMode(!state.arrowMode);
      return;
    }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a' && !isEditing() && !isFormFocused()) {
      e.preventDefault();
      clearSelection();
      for (const n of nodes.values())  addToSelection(n);
      for (const a of arrows.values()) addToSelection(a);
      return;
    }
    if (e.key.toLowerCase() === 'v' && !e.ctrlKey && !e.metaKey && !e.altKey
        && !isEditing() && !isFormFocused()) {
      e.preventDefault();
      const x = _lastMouse.x, y = _lastMouse.y;
      const el = document.elementFromPoint(x, y);
      const target = findItemFromTarget(el);
      showContextMenu({ clientX: x, clientY: y }, target);
      return;
    }
    if (e.key.toLowerCase() === 'b' && !e.ctrlKey && !e.metaKey && !e.altKey
        && !isEditing() && !isFormFocused()) {
      e.preventDefault();
      deleteSelected();
      return;
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') { state.spaceDown = false; wrap.classList.remove('space-down'); }
    if (!e.ctrlKey && !e.metaKey) setCtrlIndicator(false);
  });
  window.addEventListener('blur', () => {
    state.spaceDown = false; wrap.classList.remove('space-down');
    setCtrlIndicator(false);
  });

  // Block native HTML5 drag and stray text-selection so Ctrl+drag and
  // empty-area drag never get hijacked by the browser.
  document.addEventListener('dragstart',   (e) => e.preventDefault());
  document.addEventListener('selectstart', (e) => {
    if (!isEditing() && !isFormFocused()) e.preventDefault();
  });

  // ────────────────────────────────────────────────────────────────────
  // Universal Ctrl+drag → draw arrow.
  // Runs in CAPTURE phase at the window level so it always wins,
  // no matter what node/arrow/UI element is under the cursor.
  // ────────────────────────────────────────────────────────────────────
  window.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    const wantArrow = (e.ctrlKey || e.metaKey || state.arrowMode);
    if (!wantArrow) return;
    if (e.target && e.target.closest && (
          e.target.closest('#ctx-menu') ||
          e.target.closest('#style-popup') ||
          e.target.closest('#lightbox') ||
          e.target.closest('#mode-badge')))
      return;
    e.preventDefault();
    e.stopPropagation();
    if (state.arrowMode) setArrowMode(false);
    startArrowFromMouse(e);
  }, true);

  /* ============================ DRAG-DROP IMAGES ============================ */

  /* ============================ CLIPBOARD PASTE ============================
     Ctrl+V anywhere on the canvas drops the clipboard content as a node:
     - image files (e.g. a screenshot in your clipboard) → image node
     - HTML containing <img src="…">                    → image node
     - a URL pointing at an image                       → image node
     - plain text                                       → text node
     Paste happens at the last mouse position (or the view centre if the
     pointer hasn't moved yet). Skipped while editing text or a form input
     so normal in-editor paste keeps working.                              */

  function _pastePosition() {
    if (_lastMouse.x === 0 && _lastMouse.y === 0) {
      const r = wrap.getBoundingClientRect();
      return toWorld(r.left + r.width / 2, r.top + r.height / 2);
    }
    return toWorld(_lastMouse.x, _lastMouse.y);
  }

  document.addEventListener('paste', (e) => {
    if (isEditing() || isFormFocused()) return;
    const cd = e.clipboardData;
    if (!cd) return;
    const w = _pastePosition();

    // 1) image FILE in the clipboard (e.g. system screenshot, copied image)
    if (cd.items) {
      let i = 0;
      for (const item of cd.items) {
        if (item.kind === 'file' && item.type.startsWith('image/')) {
          const f = item.getAsFile();
          if (f) {
            const reader = new FileReader();
            const off = i++ * 16;
            reader.onload = (ev) => createImageNode(w.x + off, w.y + off, ev.target.result);
            reader.readAsDataURL(f);
          }
        }
      }
      if (i > 0) { e.preventDefault(); return; }
    }
    if (cd.files && cd.files.length) {
      let i = 0;
      for (const f of cd.files) {
        if (!f.type.startsWith('image/')) continue;
        const reader = new FileReader();
        const off = i++ * 16;
        reader.onload = (ev) => createImageNode(w.x + off, w.y + off, ev.target.result);
        reader.readAsDataURL(f);
      }
      if (i > 0) { e.preventDefault(); return; }
    }

    // 2) HTML clipboard with an <img src=…> (paste from a web page)
    const html = cd.getData('text/html');
    if (html) {
      const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (m && m[1]) {
        e.preventDefault();
        createImageNode(w.x, w.y, m[1]);
        return;
      }
    }

    // 3) plain text — use it as an image src if it looks like one, else
    //    create a text node with the pasted text.
    const text = (cd.getData('text/plain') || cd.getData('text') || '').trim();
    if (text) {
      e.preventDefault();
      if (/^(https?:|data:|blob:)/i.test(text) &&
          (/\.(png|jpe?g|gif|webp|svg|bmp|avif)(\?|#|$)/i.test(text) || text.startsWith('data:image/'))) {
        createImageNode(w.x, w.y, text);
      } else {
        createTextNode(w.x, w.y, text, false);
      }
    }
  });

  wrap.addEventListener('dragover', (e) => { e.preventDefault(); });
  wrap.addEventListener('drop', (e) => {
    e.preventDefault();
    const w = toWorld(e.clientX, e.clientY);
    const dt = e.dataTransfer;
    if (!dt) return;
    if (dt.files && dt.files.length > 0) {
      let i = 0;
      for (const f of dt.files) {
        if (!f.type.startsWith('image/')) continue;
        const reader = new FileReader();
        const off = i++ * 16;
        reader.onload = (ev) => createImageNode(w.x + off, w.y + off, ev.target.result);
        reader.readAsDataURL(f);
      }
      if (i > 0) return;
    }
    const html = dt.getData('text/html');
    if (html) {
      const m = html.match(/<img[^>]+src=["']([^"']+)["']/i);
      if (m) { createImageNode(w.x, w.y, m[1]); return; }
    }
    const url = (dt.getData('text/uri-list') || dt.getData('text/plain') || '')
                  .split('\n')[0].trim();
    if (url && /^(https?:|data:|blob:)/i.test(url)) createImageNode(w.x, w.y, url);
  });

  /* ============================ LIGHTBOX ============================ */

  let lbState = { scale: 1, x: 0, y: 0 };
  function applyLb() {
    lbImg.style.transform = `translate(${lbState.x}px, ${lbState.y}px) scale(${lbState.scale})`;
  }
  function openLightbox(src) {
    lbImg.src = src;
    lbState = { scale: 1, x: 0, y: 0 };
    applyLb();
    lb.classList.add('show');
  }
  function closeLightbox() { lb.classList.remove('show'); }
  lbClose.addEventListener('click', closeLightbox);
  lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });
  lb.addEventListener('wheel', (e) => {
    e.preventDefault();
    const old = lbState.scale;
    const ns  = Math.max(0.1, Math.min(10, old * Math.exp(-e.deltaY * 0.0015)));
    const rect = lbImg.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    const mx = e.clientX - cx;
    const my = e.clientY - cy;
    const f = ns / old;
    lbState.x = (lbState.x - mx) * f + mx;
    lbState.y = (lbState.y - my) * f + my;
    lbState.scale = ns;
    applyLb();
  }, { passive: false });
  lbImg.addEventListener('mousedown', (e) => {
    e.preventDefault(); e.stopPropagation();
    const start = { x: e.clientX, y: e.clientY };
    const sp = { x: lbState.x, y: lbState.y };
    lbImg.classList.add('dragging');
    bindDrag((ev) => {
      lbState.x = sp.x + (ev.clientX - start.x);
      lbState.y = sp.y + (ev.clientY - start.y);
      applyLb();
    }, () => lbImg.classList.remove('dragging'));
  });

  /* ============================ CONTEXT MENU ============================ */

  let _ctxWorldPos = null;

  function findItemFromTarget(el) {
    let n = el;
    while (n && n !== document.body) {
      if (n._mindNode)  return n._mindNode;
      if (n._mindArrow) return n._mindArrow;
      n = n.parentElement || n.parentNode;
    }
    return null;
  }

  function showContextMenu(e, target) {
    ctxMenu.innerHTML = '';
    _ctxWorldPos = toWorld(e.clientX, e.clientY);

    function addItem(label, action, opts) {
      const b = document.createElement('button');
      b.textContent = label;
      if (opts && opts.danger) b.className = 'danger';
      b.addEventListener('click', () => { hideContextMenu(); action(); });
      ctxMenu.appendChild(b);
    }
    function addSep() { ctxMenu.appendChild(document.createElement('hr')); }
    function addHint(text) {
      const d = document.createElement('div');
      d.className = 'hint'; d.textContent = text;
      ctxMenu.appendChild(d);
    }

    if (target) {
      if (!state.selected.has(target)) selectOnly(target);

      if (target.kind === 'node' && target.type === 'image') {
        addItem('Open / Zoom Image', () => openLightbox(target.src));
        addSep();
      }
      addItem('Bring to Front (↑)', bringSelectedForward);
      addItem('Send to Back (↓)',   sendSelectedBackward);
      addSep();
      addItem(state.selected.size > 1 ? `Delete ${state.selected.size} items (B)` : 'Delete (B)',
              deleteSelected, { danger: true });
    } else {
      const wp = _ctxWorldPos;
      addItem('Add Text Here',     () => createTextNode(wp.x, wp.y, '', true));
      addItem('Add Checkbox Here', () => createCheckboxNode(wp.x, wp.y, 'task', false));
      addItem('Add Image…',        () => fileInput.click());
      addItem('Draw Arrow (A)',    () => setArrowMode(true));
      addSep();
      if (state.selected.size > 0) {
        addItem(`Bring Selected to Front (${state.selected.size}) ↑`, bringSelectedForward);
        addItem(`Send Selected to Back (${state.selected.size}) ↓`,   sendSelectedBackward);
        addItem(`Delete Selected (${state.selected.size})`,           deleteSelected, { danger: true });
        addSep();
      }
      addItem('Reset View', () => {
        view.x = 0; view.y = 0; view.scale = 1;
        applyTransform(); repositionStylePopup(); scheduleSave();
      });
      addItem('Clear Everything', () => {
        if (!confirm('Erase the entire mind map? This cannot be undone.')) return;
        _suppressSave = true;
        for (const n of [...nodes.values()]) n.el.remove();
        nodes.clear();
        for (const a of [...arrows.values()]) a.el.remove();
        arrows.clear();
        state.selected.clear();
        updateStylePopup();
        view.x = 0; view.y = 0; view.scale = 1;
        applyTransform();
        _suppressSave = false;
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      }, { danger: true });
      addSep();
      addHint('A = arrow mode · Ctrl+drag = arrow · V = menu · double-click empty = add text · Alt+click = cycle stacked nodes · Space+drag = pan');
    }

    ctxMenu.style.left = e.clientX + 'px';
    ctxMenu.style.top  = e.clientY + 'px';
    ctxMenu.classList.add('show');
    const r = ctxMenu.getBoundingClientRect();
    if (r.right  > window.innerWidth)  ctxMenu.style.left = (window.innerWidth  - r.width  - 6) + 'px';
    if (r.bottom > window.innerHeight) ctxMenu.style.top  = (window.innerHeight - r.height - 6) + 'px';
  }

  function hideContextMenu() {
    ctxMenu.classList.remove('show');
    ctxMenu.innerHTML = '';
  }

  document.addEventListener('contextmenu', (e) => {
    if (e.target.closest && (e.target.closest('#lightbox') || e.target.closest('#ctx-menu') ||
                              e.target.closest('#style-popup'))) return;
    if (isEditing()) return;
    e.preventDefault();
    const target = findItemFromTarget(e.target);
    showContextMenu(e, target);
  });

  document.addEventListener('mousedown', (e) => {
    if (!ctxMenu.classList.contains('show')) return;
    if (e.target.closest && e.target.closest('#ctx-menu')) return;
    hideContextMenu();
  }, true);

  /* ============================ FILE INPUT ============================ */

  fileInput.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const w = _ctxWorldPos || (() => {
      const r = wrap.getBoundingClientRect();
      return toWorld(r.left + r.width / 2, r.top + r.height / 2);
    })();
    const reader = new FileReader();
    reader.onload = (ev) => createImageNode(w.x, w.y, ev.target.result);
    reader.readAsDataURL(f);
    fileInput.value = '';
  });

  window.addEventListener('resize', repositionStylePopup);

  /* ============================ INIT ============================ */

  loadNow().catch(e => console.warn('mindmap load failed', e));
  window.addEventListener('beforeunload', saveNow);
  // 'pagehide' fires more reliably than beforeunload on mobile and on tab
  // switches that the browser may suspend — extra safety net.
  window.addEventListener('pagehide', saveNow);
})();
</script>
</body>
</html>
